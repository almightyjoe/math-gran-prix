<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Math Gran Prix Web</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Network-Ready Prototype</p>
        <h1>Math Gran Prix Web</h1>
      </div>
      <div class="topbar-actions">
        <button id="new-race-btn" class="ghost-btn">New Race</button>
        <button id="reset-scores-btn" class="ghost-btn danger">Reset Records</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel setup-panel">
        <div class="panel-header">
          <h2>Race Setup</h2>
          <p>Local browser prototype for the future Raspberry Pi service build.</p>
        </div>

        <div class="setup-grid">
          <label>
            <span>Total Drivers</span>
            <select id="player-count"></select>
          </label>
          <label>
            <span>Human Drivers</span>
            <select id="human-count"></select>
          </label>
          <label>
            <span>Math Mode</span>
            <select id="mode-select"></select>
          </label>
          <label>
            <span>Track Layout</span>
            <select id="track-select"></select>
          </label>
          <label>
            <span>Theme</span>
            <select id="theme-select">
              <option value="sand">Sand</option>
              <option value="midnight">Midnight</option>
              <option value="forest">Forest</option>
            </select>
          </label>
        </div>

        <div id="driver-config" class="driver-config"></div>

        <div class="setup-actions">
          <button id="start-race-btn" class="primary-btn">Start Prototype Race</button>
        </div>
      </section>

      <section class="panel board-panel">
        <div class="panel-header">
          <h2>Track View</h2>
          <p>SVG board with clearer hazards, cleaner road mapping, and responsive framing.</p>
        </div>
        <div id="board-stage" class="board-stage"></div>
      </section>

      <aside class="sidebar">
        <section class="panel status-panel">
          <div class="panel-header compact">
            <h2>Race Control</h2>
          </div>
          <div id="status-summary" class="status-summary"></div>
        </section>

        <section class="panel roster-panel">
          <div class="panel-header compact">
            <h2>Drivers</h2>
          </div>
          <div id="driver-roster" class="driver-roster"></div>
        </section>

        <section class="panel prompt-panel">
          <div class="panel-header compact">
            <h2 id="prompt-title">Ready</h2>
          </div>
          <div id="prompt-body" class="prompt-body"></div>
          <div id="move-controls" class="move-controls"></div>
          <div id="answer-controls" class="answer-controls"></div>
        </section>

        <section class="panel records-panel">
          <div class="panel-header compact">
            <h2>Records</h2>
          </div>
          <div id="records-body" class="records-body"></div>
        </section>
      </aside>
    </main>
  </div>

  <template id="driver-config-template">
    <div class="driver-card">
      <div class="driver-card-top">
        <div class="swatch"></div>
        <strong class="driver-name"></strong>
      </div>
      <label>
        <span>Initials</span>
        <input class="driver-initials" maxlength="3" spellcheck="false">
      </label>
      <label>
        <span>Timed?</span>
        <input class="driver-timed" type="checkbox">
      </label>
      <label>
        <span>Controller</span>
        <select class="driver-controller">
          <option value="human">Human</option>
          <option value="ai">AI</option>
        </select>
      </label>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
